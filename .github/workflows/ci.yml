name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal web/embed.go)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
        # golangci-lint runs locally via `make lint`; it is omitted from CI until its v2 release
        # line, which supports modern go directives, is wired in. gofmt + go vet gate CI here.
