run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - misspell
    - unconvert
    - bodyclose
    - noctx

linters-settings:
  goimports:
    local-prefixes: github.com/yusufornek/lemonet
  revive:
    rules:
      - name: exported
        disabled: false
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
